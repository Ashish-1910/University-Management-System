<!DOCTYPE html>
<html>

<head>
    <title>Student Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 30px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            margin: 20px auto;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0 0 10px #000;
        }

        button {
            padding: 10px 20px;
            margin: 10px;
            border: none;
            border-radius: 5px;
            background: #38bdf8;
            cursor: pointer;
        }

        button:hover {
            background: #0284c7;
        }
    </style>
</head>

<body>

    <h1>🎓 Student Management Dashboard</h1>

    <div class="card">
        <h2>Actions</h2>
        <button onclick="alert('Add Student Clicked')">Add Student</button>
        <button onclick="alert('View Students Clicked')">View Students</button>
        <button onclick="alert('Delete Student Clicked')">Delete Student</button>
    </div>

</body>

</html>
